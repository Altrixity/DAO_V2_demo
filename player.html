<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="main.css">
    <title>Game Loader</title>
    <style>
        body {
            margin: 0;
        }
        iframe {
            width: 1000px;
            height: 600px;
            border: 10px rgb(48, 118, 250)e;
        }
        #fsBtn {
            position: fixed;
            top: 10px;
            right: 10px;
            padding: 8px 12px;
            background: rgb(0, 0, 0);
            color: white;
            border: none;
            cursor: pointer;
            z-index: 1000;
        }
    </style>
</head>
<body>
 <header>
            <h2>DAO</h2><h2 class="colorchangev2">V2 </h2><h2>Player</h2>
        </header>
<button id="fsBtn" onclick="toggleFullscreen()">Fullscreen</button>

<iframe id="gameFrame"></iframe>

<script>
    // Load game from URL (?game=Name)
    const params = new URLSearchParams(window.location.search);
    const game = params.get("game");

    if (game) {
        document.getElementById("gameFrame").src = "GAMESHTML/" + game + ".html";
    }

function toggleFullscreen() {
    const frame = document.getElementById("gameFrame");

    if (!document.fullscreenElement) {
        if (frame.requestFullscreen) {
            frame.requestFullscreen();
        } else if (frame.webkitRequestFullscreen) {
            frame.webkitRequestFullscreen();
        } else if (frame.msRequestFullscreen) {
            frame.msRequestFullscreen();
        }
    } else {
        document.exitFullscreen();
    }
}
</script>




</body>
</html>
