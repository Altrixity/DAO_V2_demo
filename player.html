<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="main.css">
    <title>DAO Loader</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: black;

            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        canvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: -1;
        }

        iframe {
            width: 1000px;
            height: 600px;
            border: 10px solid rgb(113, 210, 255);
            position: relative;
            z-index: 1;
        }

        header {
            position: fixed;
            top: 10px;
            left: 10px;
            z-index: 2;
            display: flex;
            gap: 5px;
        }

        #fsBtn {
            position: fixed;
            top: 10px;
            right: 10px;
            padding: 8px 12px;
            border-radius: 25px;
            background: rgb(113, 210, 255);
            color: white;
            border: none;
            cursor: pointer;
            z-index: 1000;
        }
    </style>
</head>
<body>

<canvas id="rain"></canvas>

<header>
    <h2>DAO</h2><h2 class="colorchangev2">V2</h2><h2>Player</h2>
</header>

<button id="fsBtn" onclick="toggleFullscreen()">Fullscreen</button>

<iframe id="viewFrame"></iframe>

<script>
const canvas = document.getElementById("rain");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let raindrops = [];

for (let i = 0; i < 400; i++) {
    raindrops.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        length: Math.random() * 20 + 10,
        speed: Math.random() * 4 + 4
    });
}

function drawRain() {
    ctx.fillStyle = "rgba(0, 0, 0, 0.2)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.strokeStyle = "rgba(180, 180, 180, 0.7)";
    ctx.lineWidth = 1;

    for (let i = 0; i < raindrops.length; i++) {
        let r = raindrops[i];

        ctx.beginPath();
        ctx.moveTo(r.x, r.y);
        ctx.lineTo(r.x, r.y + r.length);
        ctx.stroke();

        r.y += r.speed;

        if (r.y > canvas.height) {
            r.y = -20;
            r.x = Math.random() * canvas.width;
        }
    }
}

function animate() {
    drawRain();
    requestAnimationFrame(animate);
}

window.addEventListener("resize", () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
});

animate();

// Load view from URL (?view=Name)
const params = new URLSearchParams(window.location.search);
const view = params.get("view");

if (view) {
    document.getElementById("viewFrame").src = "GAMESHTML/" + view + ".html";
}

function toggleFullscreen() {
    const frame = document.getElementById("viewFrame");

    if (!document.fullscreenElement) {
        if (frame.requestFullscreen) {
            frame.requestFullscreen();
        } else if (frame.webkitRequestFullscreen) {
            frame.webkitRequestFullscreen();
        } else if (frame.msRequestFullscreen) {
            frame.msRequestFullscreen();
        }
    } else {
        document.exitFullscreen();
    }
}
</script>

</body>
</html>
